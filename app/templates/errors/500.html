{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - 500</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --primary-light: #ef4444;
            --gray-dark: #1f2937;
            --gray-light: #f9fafb;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fee2e2 0%, var(--gray-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(220, 38, 38, 0.1);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(220, 38, 38, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        .error-code {
            font-size: 100px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(220, 38, 38, 0.15);
        }

        h1 {
            font-size: 32px;
            color: var(--gray-dark);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .error-message {
            margin-bottom: 40px;
        }

        .error-message p {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .error-reference {
            background: #fef2f2;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: left;
            font-size: 14px;
            color: #6b7280;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(220, 38, 38, 0.4);
        }

        .btn-secondary {
            background: var(--gray-light);
            color: var(--gray-dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            .error-container {
                padding: 40px 25px;
            }

            .error-code {
                font-size: 70px;
            }

            h1 {
                font-size: 24px;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .error-reference {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code">500</div>
        <div class="error-message">
            <h1>Server Error</h1>
            <p><span class="status-indicator"></span>Something went wrong on our end.</p>
            <p>Our team has been notified and is working on fixing this issue.</p>
        </div>
        <div class="error-reference">
            Error ID: {{ request.META.HTTP_X_FORWARDED_FOR|default:request.META.REMOTE_ADDR }}
        </div>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">← Go Home</a>
            <a href="mailto:support@example.com?subject=Error%20Report" class="btn btn-secondary">📧 Contact Support</a>
        </div>
    </div>
</body>
</html>
