{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Request - 400</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --gray-dark: #1f2937;
            --gray-light: #f9fafb;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ede9fe 0%, var(--gray-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border-top: 4px solid var(--primary);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            background: #ede9fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }

        .error-code {
            font-size: 100px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(139, 92, 246, 0.15);
        }

        h1 {
            font-size: 32px;
            color: var(--gray-dark);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .error-message p {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .error-details {
            background: #ede9fe;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: left;
            font-size: 14px;
            color: #6b7280;
        }

        .error-details strong {
            color: var(--primary-dark);
            display: block;
            margin-bottom: 8px;
        }

        .error-details ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .error-details li {
            margin-bottom: 6px;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary {
            background: var(--gray-light);
            color: var(--gray-dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .decoration {
            position: fixed;
            opacity: 0.08;
            font-size: 250px;
            pointer-events: none;
            color: var(--primary);
        }

        .decoration-left {
            top: -80px;
            left: -80px;
            transform: rotate(-30deg);
        }

        .decoration-right {
            bottom: -80px;
            right: -80px;
            transform: rotate(30deg);
        }

        @media (max-width: 600px) {
            .error-container {
                padding: 40px 25px;
            }

            .error-code {
                font-size: 70px;
            }

            h1 {
                font-size: 24px;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .decoration {
                font-size: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="decoration decoration-left">⚙️</div>
    <div class="decoration decoration-right">⚙️</div>

    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code">400</div>
        <div class="error-message">
            <h1>Bad Request</h1>
            <p>The request could not be understood by the server.</p>
        </div>

        <div class="error-details">
            <strong>What went wrong?</strong>
            <ul>
                <li>Invalid request parameters</li>
                <li>Malformed request syntax</li>
                <li>Missing required fields</li>
                <li>Invalid data format</li>
            </ul>
        </div>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">← Go Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
        </div>
    </div>
</body>
</html>
